<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories of Steel — Mon Valley Walking Tours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0f0d08;
      color: #ede5d4;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── HOMEPAGE ── */
    #homepage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem 2rem; gap: 1rem;
    }

    /* ── PERSPECTIVE SCENE ── */
    .scene-svg { width: 100%; max-width: 920px; flex-shrink: 0; overflow: visible; }


    /* ── SMOKE ANIMATION ── */
    @keyframes wisp {
      0%,100% { opacity: .45; transform: translateX(0) translateY(0) scaleX(1); }
      50%      { opacity: .15; transform: translateX(1.5px) translateY(-6px) scaleX(.8); }
    }
    .smoke1 { animation: wisp 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
    .smoke2 { animation: wisp 3.6s ease-in-out infinite; animation-delay: -1.4s; transform-box: fill-box; transform-origin: center bottom; }

    /* ── ARCH PORTALS ── */
    .arches-row {
      display: flex; gap: 36px;
      align-items: flex-end; justify-content: center;
      max-width: 840px; width: 100%;
    }

    .arch-wrap {
      position: relative; width: 190px; height: 304px;
      flex-shrink: 0; cursor: pointer;
    }

    .arch-clip {
      position: absolute; inset: 0;
      border-radius: 95px 95px 0 0;
      overflow: hidden;
      filter: grayscale(1);
      transition: filter .6s ease;
    }
    .arch-wrap:hover .arch-clip { filter: grayscale(0) brightness(1.12) saturate(1.1); }

    .arch-bg {
      position: absolute; inset: -6px;
      background-size: cover; background-position: center;
      background-color: #2a1f0f;
      transition: transform .6s ease;
    }
    .arch-wrap:hover .arch-bg { transform: scale(1.06); }

    .arch-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.08) 0%, rgba(0,0,0,.55) 100%);
    }

    .arch-outline {
      position: absolute; inset: 0; pointer-events: none;
      transition: opacity .3s; opacity: .7;
    }
    .arch-wrap:hover .arch-outline { opacity: 1; }

    .arch-label-svg {
      position: absolute; top: 0; left: 0;
      width: 190px; height: 190px;
      pointer-events: none; z-index: 2;
    }

    .arch-bricks {
      position: absolute; top: 0; left: 0;
      width: 190px; height: 304px;
      pointer-events: none; z-index: 4;
      overflow: visible;
    }

    .arch-enter {
      position: absolute; bottom: 38px; left: 0; right: 0;
      text-align: center; font-size: 10.5px; letter-spacing: 2.5px;
      color: rgba(237,229,212,.9); z-index: 5;
      opacity: 0; transform: translateY(4px);
      transition: opacity .25s, transform .25s;
    }
    .arch-wrap:hover .arch-enter { opacity: 1; transform: translateY(0); }

    /* ── BOTTOM NAV ── */
    .home-footer {
      display: flex; gap: 2rem; align-items: center;
      opacity: .45; transition: opacity .3s;
    }
    .home-footer:hover { opacity: .7; }
    .home-footer a {
      font-size: 11px; letter-spacing: 1.5px;
      color: #ede5d4; text-decoration: none;
    }
    .home-footer a:hover { color: #c8963c; }

    /* ── ZOOM TRANSITION ── */
    /* Full-screen image shown immediately behind everything */
    #zoom-bg {
      position: fixed; inset: 0; z-index: 998;
      background-size: cover; background-position: center;
      display: none;
    }
    /* Arch frame: scales up from arch position, arch-shaped hole shows image through */
    #zoom-overlay {
      position: fixed; z-index: 1000;
      display: none;
    }
    #zoom-overlay-hole {
      position: absolute; inset: 0;
      border-radius: 95px 95px 0 0;
      box-shadow: 0 0 0 3000px #0f0d08;
    }
    #zoom-overlay-bricks {
      position: absolute; top: 0; left: 0;
      width: 190px; height: 304px;
      overflow: visible; pointer-events: none;
      z-index: 1;
    }

    /* ── SCENE DARKEN (sits above zoom overlay, below page content) ── */
    #scene-darken {
      position: fixed; inset: 0; z-index: 1001;
      background: rgba(15,13,8,0);
      display: none; pointer-events: none;
    }

    /* ── NEIGHBORHOOD PAGE ── */
    #nbh-page {
      position: fixed; inset: 0; z-index: 2000;
      display: none; overflow-y: auto;
      background: transparent;
    }

    .nbh-inner {
      position: relative; z-index: 1;
      min-height: 100vh; color: #ede5d4;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; justify-content: center;
    }

    .nbh-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid rgba(200,150,60,.18);
    }

    .back-btn {
      background: none; border: 1px solid rgba(237,229,212,.3);
      color: #ede5d4; padding: 8px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; letter-spacing: 1.5px;
      cursor: pointer; transition: all .2s;
    }
    .back-btn:hover { background: rgba(237,229,212,.1); border-color: rgba(237,229,212,.6); }

    .nbh-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 15px;
      color: rgba(237,229,212,.45);
    }

    .nbh-hero {
      padding: 1.5rem 2.5rem 2rem;
      max-width: 720px;
      margin: 0 auto; text-align: center;
    }

    .nbh-est {
      font-size: 11px; letter-spacing: 3px; color: #c8963c; margin-bottom: 1rem;
    }

    .nbh-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700; line-height: .92; color: #ede5d4;
      margin-bottom: 1.4rem; letter-spacing: -1.5px;
    }

    .nbh-desc {
      font-size: 17px; line-height: 1.72;
      color: rgba(237,229,212,.7);
      max-width: 520px; margin: 0 auto 2.5rem;
    }

    .nbh-stats {
      display: flex; gap: 2.5rem; flex-wrap: wrap; margin-bottom: 3.5rem; justify-content: center;
    }
    .stat { display: flex; flex-direction: column; gap: 5px; }
    .stat-label { font-size: 10px; letter-spacing: 2.5px; color: #c8963c; }
    .stat-val { font-size: 15px; color: #ede5d4; }

    .nbh-stops-section { padding: 0 2.5rem 2rem; max-width: 720px; margin: 0 auto; }

    .stops-heading {
      font-size: 10px; letter-spacing: 3px;
      color: rgba(237,229,212,.38); margin-bottom: 1rem;
    }

    .stops-grid {
      display: grid; grid-template-columns: repeat(2,1fr);
      gap: 1px; background: rgba(200,150,60,.12);
      border: 1px solid rgba(200,150,60,.12);
      margin-bottom: 3rem;
    }

    .stop-cell {
      padding: 1.2rem 1.4rem;
      background: rgba(15,13,8,.72);
      display: flex; gap: 1rem; align-items: flex-start;
    }

    .stop-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 400;
      color: rgba(200,150,60,.4); line-height: 1; flex-shrink: 0;
    }

    .stop-text {
      font-size: 13.5px; color: rgba(237,229,212,.76);
      line-height: 1.5; padding-top: 5px;
    }

    .nbh-ctas { padding: 0 2.5rem 4rem; display: flex; gap: 1rem; flex-wrap: wrap; max-width: 720px; margin: 0 auto; justify-content: center; }

    .btn-book {
      background: #c8963c; color: #0f0d08; border: none;
      padding: 13px 34px; font-family: 'Inter', sans-serif;
      font-size: 12.5px; font-weight: 500; letter-spacing: 1.5px;
      cursor: pointer; transition: background .2s;
    }
    .btn-book:hover { background: #e0a844; }

    .btn-ghost {
      background: none; color: rgba(237,229,212,.6);
      border: 1px solid rgba(237,229,212,.22);
      padding: 13px 28px; font-family: 'Inter', sans-serif;
      font-size: 12.5px; letter-spacing: 1.5px; cursor: pointer; transition: all .2s;
    }
    .btn-ghost:hover { border-color: rgba(237,229,212,.5); color: rgba(237,229,212,.9); }
  </style>
</head>

<div id="nbh-page">
  <div class="nbh-inner">

      <button class="back-btn" onclick="goBack()">← Back</button>

    </section>

      <button class="btn-ghost">Read the full story</button>
    </div>

</div>

<script>
var N = {
  wilkinsburg: {
    est: 'Est. 1887',
    name: 'Wilkinsburg',
    desc: 'A gateway borough of Victorian grandeur and Great Migration energy, now a community writing the next chapter of its story.',
    image: 'https://storiesofsteel.com/wp-content/uploads/2026/03/wood-st-wilkinsurg-postcard-1.jpg',
    duration: '75 min',
    distance: '1.0 mile',
    group: 'Up to 15',
    stops: [
      { n:'01', t:'Historic Penn Avenue commercial corridor' },
      { n:'02', t:'Hamnett Place National Historic District' },
      { n:'03', t:'Electric street railway heritage sites' },
      { n:'04', t:'Great Migration stories and community identity' }
    ]
  },
  homestead: {
    est: 'Est. 1880',
    name: 'Homestead',
    desc: 'The Strike of 1892 changed American labor history. Walk the riverbanks where steelworkers stood their ground against Carnegie and Frick.',
    image: 'https://storiesofsteel.com/wp-content/uploads/2026/03/homestead-postcard-ros-1.jpg',
    duration: '90 min',
    distance: '1.5 miles',
    group: 'Up to 15',
    stops: [
      { n:'01', t:'Pinkerton landing site on the Monongahela' },
      { n:'02', t:'The Bost Building — strike headquarters, 1892' },
      { n:'03', t:'Waterfront, site of the Homestead Steel Works' },
      { n:'04', t:'Carnegie library and bathhouse complex' }
    ]
  },
  braddock: {
    est: 'Est. 1867',
    name: 'Braddock',
    desc: "Home to Carnegie Steel's Edgar Thomson Works — still operating today — and the first Carnegie library in America. Fire, iron, and endurance.",
    image: 'https://storiesofsteel.com/wp-content/uploads/2026/03/new-braddock.jpg',
    duration: '90 min',
    distance: '1.2 miles',
    group: 'Up to 15',
    stops: [
      { n:'01', t:'Edgar Thomson Works — Carnegie Steel, still in operation' },
      { n:'02', t:"America's first Carnegie public library (1889)" },
      { n:'03', t:"Braddock's Field — Battle of 1755 site" },
      { n:'04', t:'PUMP project and 21st-century community revival' }
    ]
  }
};

var active = null;

function enterArch(id) {
  if (active) return;
  active = id;

  var n  = N[id];
  var el = document.getElementById('arch-' + id);
  var r  = el.getBoundingClientRect();
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var dur = '2.5s linear';

  var bg = document.getElementById('zoom-bg');
  bg.style.backgroundImage = 'url(' + n.image + ')';
  bg.style.display = 'block';

  // Translation needed to move the arch center to the viewport center.
  var tx = vw / 2 - (r.left + r.width  / 2);
  var ty = vh / 2 - (r.top  + r.height / 2);

  // Once centered, scale to cover the full viewport.
  var scale = Math.max(vw / r.width, vh / r.height) * 3;

  var ov = document.getElementById('zoom-overlay');
  ov.style.left   = r.left   + 'px';
  ov.style.top    = r.top    + 'px';
  ov.style.width  = r.width  + 'px';
  ov.style.height = r.height + 'px';
  ov.style.transformOrigin = 'center';
  ov.style.transition = 'none';
  ov.style.transform  = 'translate(0, 0)';
  ov.style.display    = 'block';

  void ov.offsetWidth;

  // Phase 1: slide to center of screen.
  ov.style.transition = 'transform 1.2s ease-in-out';
  ov.style.transform  = 'translate(' + tx + 'px, ' + ty + 'px)';

  // Phase 2: scale up from center.
  setTimeout(function () {
    ov.style.transition = 'transform ' + dur;
    ov.style.transform  = 'translate(' + tx + 'px, ' + ty + 'px) scale(' + scale + ')';
    setTimeout(function () { showPage(id); }, 1200);
  }, 1200);
}

function showPage(id) {
  var n = N[id];

  document.getElementById('nbh-est').textContent  = n.est;
  document.getElementById('nbh-name').textContent = n.name;
  document.getElementById('nbh-desc').textContent = n.desc;
  document.getElementById('nbh-book').textContent = 'Reserve a spot — ' + n.name;

  document.getElementById('nbh-stats').innerHTML =
    mkStat('Duration', n.duration) + mkStat('Distance', n.distance) + mkStat('Group size', n.group);

  document.getElementById('nbh-stops').innerHTML = n.stops.map(function (s) {
    return '<div class="stop-cell"><span class="stop-num">' + s.n + '</span><span class="stop-text">' + s.t + '</span></div>';
  }).join('');

  document.getElementById('zoom-overlay').style.display = 'none';

  var dk = document.getElementById('scene-darken');
  dk.style.transition = 'none';
  dk.style.background = 'rgba(15,13,8,0)';
  dk.style.display    = 'block';

  var pg = document.getElementById('nbh-page');
  pg.style.display    = 'block';
  pg.style.opacity    = '0';
  pg.style.transition = 'none';
  pg.scrollTop = 0;

  void dk.offsetWidth;

  dk.style.transition = 'background 0.7s ease';
  dk.style.background = 'rgba(15,13,8,0.76)';
  pg.style.transition = 'opacity 0.7s ease';
  pg.style.opacity    = '1';
}

function mkStat(label, val) {
  return '<div class="stat"><div class="stat-label">' + label + '</div><div class="stat-val">' + val + '</div></div>';
}

function goBack() {
  var pg = document.getElementById('nbh-page');
  pg.style.transition = 'opacity 0.3s ease';
  pg.style.opacity    = '0';

  setTimeout(function () {
    pg.style.display = 'none';

    var dk = document.getElementById('scene-darken');
    var bg = document.getElementById('zoom-bg');
    var ov = document.getElementById('zoom-overlay');

    dk.style.transition = 'background 0.45s ease';
    dk.style.background = 'rgba(15,13,8,0)';
    bg.style.transition = 'opacity 0.45s ease';
    bg.style.opacity    = '0';

    setTimeout(function () {
      dk.style.display      = 'none';
      bg.style.display      = 'none';
      bg.style.opacity      = '';
      bg.style.backgroundImage = '';
      bg.style.transition   = '';
      ov.style.display      = 'none';
      ov.style.transform    = '';
      ov.style.transition   = '';
      active = null;
    }, 450);
  }, 300);
}

document.querySelectorAll('.arch-wrap').forEach(function (el) {
  el.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
  });
});
</script>
